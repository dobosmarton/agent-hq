services:
  runner:
    build:
      context: ..
      dockerfile: agent-runner/Dockerfile
    env_file: .env
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "3"
    volumes:
      - ./config.json:/app/agent-runner/config.json:ro
      - ./config.local.json:/app/agent-runner/config.local.json:ro
      - ./github-app.pem:/app/github-app.pem:ro
      - /home/deploy/repos:/repos
      - runner-state:/app/agent-runner/state

volumes:
  runner-state:
